# Stack: RAGFlow (upstream) + Postgres ứng dụng; tùy chọn backend + frontend trong Docker (profile `app-docker`).
#
# Dev (BE/FE trên host, reload nhanh): chỉ hạ tầng — Postgres map ra 127.0.0.1:${POSTGRES_APP_HOST_PORT:-5433}.
#   docker compose --env-file docker/ragflow/upstream/.env up -d
#   Sau đó: backend `uvicorn` từ thư mục backend/ (xem backend/.env.example), frontend `npm run dev` (INTERNAL_API_URL mặc định 127.0.0.1:8000).
#
# Full trong Docker (BE/FE trong container): nối profile `app-docker` vào cùng bộ profile RAGFlow
# (không chỉ `--profile app-docker` — sẽ ghi đè COMPOSE_PROFILES từ .env và thiếu ragflow-cpu / doc engine).
#   COMPOSE_PROFILES=elasticsearch,cpu,app-docker docker compose --env-file docker/ragflow/upstream/.env up -d
#   (thay elasticsearch,cpu bằng đúng giá trị DOC_ENGINE,DEVICE trong .env của bạn nếu khác.)
#   Hoặc sửa dòng COMPOSE_PROFILES trong docker/ragflow/upstream/.env thành …,app-docker rồi `docker compose … up -d`.
#
# RAGFlow UI/API: cổng trong docker/ragflow/upstream/.env (vd. 18080, 19380). Ollama trên host: host.docker.internal:11434.

name: ragflow_legal

include:
  - path: docker/ragflow/upstream/docker-compose.yml
    env_file:
      - docker/ragflow/upstream/.env

services:
  postgres_app:
    image: postgres:16-alpine
    container_name: ragflow_legal_postgres_app
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_APP_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD:-app_dev_change_me}
      POSTGRES_DB: ${POSTGRES_APP_DB:-ragflow_legal}
    ports:
      - "127.0.0.1:${POSTGRES_APP_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    networks:
      - ragflow
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_APP_USER:-app} -d ${POSTGRES_APP_DB:-ragflow_legal}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    profiles:
      - app-docker
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ragflow_legal_backend
    restart: unless-stopped
    # RAGFLOW_API_KEY / RAGFLOW_CHAT_ID lấy từ file (điền giá trị thật), tránh ${...} rỗng ghi đè env_file.
    env_file:
      - docker/ragflow/upstream/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_APP_USER:-app}:${POSTGRES_APP_PASSWORD:-app_dev_change_me}@postgres_app:5432/${POSTGRES_APP_DB:-ragflow_legal}
      RAGFLOW_BASE_URL: http://ragflow-cpu:9380
    ports:
      - "127.0.0.1:${APP_BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres_app:
        condition: service_healthy
    networks:
      - ragflow
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    profiles:
      - app-docker
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ragflow_legal_frontend
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "127.0.0.1:${APP_FE_PORT:-3000}:3000"
    networks:
      - ragflow

volumes:
  postgres_app_data:
    name: ragflow_legal_postgres_app_data
