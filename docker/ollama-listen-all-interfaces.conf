# Drop-in cho Ollama: cho phép RAGFlow (Docker) gọi API qua host.docker.internal.
#
# Cài đặt:
#   sudo mkdir -p /etc/systemd/system/ollama.service.d
#   sudo cp docker/ollama-listen-all-interfaces.conf /etc/systemd/system/ollama.service.d/listen-docker.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart ollama
#
# Kiểm tra: ss -tlnp | grep 11434  → nên thấy 0.0.0.0:11434 hoặc *:11434

[Service]
Environment="OLLAMA_HOST=0.0.0.0"
